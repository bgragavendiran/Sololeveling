<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>System Window - Initialization</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&amp;family=Share+Tech+Mono&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#201f22",
                        "surface-dim": "#131316",
                        "surface-tint": "#a9c7ff",
                        "on-tertiary-fixed": "#00201d",
                        "tertiary-fixed": "#79f7ea",
                        "on-primary-fixed-variant": "#00468b",
                        "error": "#ffb4ab",
                        "surface-container-high": "#2a2a2d",
                        "outline": "#8b919f",
                        "tertiary-fixed-dim": "#5adace",
                        "on-primary-fixed": "#001b3d",
                        "error-container": "#93000a",
                        "inverse-surface": "#e5e1e5",
                        "surface-bright": "#39393c",
                        "inverse-primary": "#005db6",
                        "on-surface-variant": "#c1c6d6",
                        "secondary": "#ffb4ab",
                        "on-secondary": "#690005",
                        "on-primary": "#003063",
                        "on-tertiary-fixed-variant": "#00504a",
                        "surface-container-lowest": "#0e0e11",
                        "on-primary-container": "#002957",
                        "on-surface": "#e5e1e5",
                        "on-tertiary": "#003733",
                        "secondary-fixed-dim": "#ffb4ab",
                        "on-secondary-fixed": "#410002",
                        "primary-fixed-dim": "#a9c7ff",
                        "on-tertiary-container": "#00302c",
                        "surface": "#131316",
                        "background": "#131316",
                        "on-secondary-container": "#ffe7e4",
                        "surface-variant": "#353438",
                        "surface-container-low": "#1c1b1e",
                        "tertiary": "#5adace",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#353438",
                        "outline-variant": "#414753",
                        "primary-container": "#3b90ff",
                        "tertiary-container": "#00a297",
                        "secondary-fixed": "#ffdad6",
                        "secondary-container": "#d70016",
                        "primary": "#a9c7ff",
                        "on-error": "#690005",
                        "on-background": "#e5e1e5",
                        "primary-fixed": "#d6e3ff",
                        "on-secondary-fixed-variant": "#93000b",
                        "inverse-on-surface": "#313033"
                    },
                    "fontFamily": {
                        "headline": ["Rajdhani"],
                        "body": ["Inter"],
                        "label": ["Share Tech Mono"]
                    }
                },
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .clipped-corner {
            clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
        }
        .scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(46, 140, 255, 0.05) 50%);
            background-size: 100% 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#050507] text-on-background font-body selection:bg-primary selection:text-on-primary min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Background Void Effects -->
<div class="fixed inset-0 pointer-events-none">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(46,140,255,0.08),transparent_70%)]"></div>
<div class="absolute inset-0 scanline opacity-30"></div>
</div>
<!-- Top Status Bar (Contextual Shell - TopAppBar) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#050507]/60 backdrop-blur-xl border-b-[0.5px] border-blue-500/20 shadow-[0_0_20px_rgba(46,140,255,0.15)]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-blue-500/40 flex items-center justify-center overflow-hidden">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Futuristic holographic portrait of a high-rank hunter with glowing blue eyes and digital data overlays" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsdVlRuE2s3sywn-tIUJt6s0K_e76U36tLg1Nm03QsmcWGz5UCsZILI2lMLvy7zq6GgFqM3c0GwSr_GBLtABZiT1fMb6ps4u2E1GIV3BcqFGgkJRgRVXI5OCokly-cvU0J5jg2CFM5sDq6MxzQILIbDN3eckniiK1ilCwwxXGqoi-FCG4elJ0R19WjYG_5sbBi-in73AQtdU5iY9r0OuOrZKi6hkO5dlx84sDfffDViI-KswdOGUAjd5BfsAgKRKAP2mkgtN_H8lc"/>
</div>
<h1 class="font-headline uppercase tracking-widest font-bold text-blue-500 text-xl italic">SYSTEM STATUS</h1>
</div>
<div class="flex items-center gap-4 text-slate-500">
<span class="font-label text-[10px] tracking-widest opacity-60">SYNCING_UID: 00-00-00</span>
<span class="material-symbols-outlined text-blue-500" data-icon="sensors">sensors</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-lg px-6 flex flex-col items-center">
<!-- System Initialization Message -->
<div class="w-full text-center mb-12 space-y-2">
<p class="font-label text-primary tracking-[0.3em] text-xs opacity-80">PROTOCOL: BOOT_SEQUENCE</p>
<h2 class="font-headline text-3xl md:text-4xl font-bold text-primary tracking-tighter uppercase drop-shadow-[0_0_12px_rgba(169,199,255,0.5)]">
                INITIATING SYSTEM PLAYER IDENTIFICATION
            </h2>
<div class="h-0.5 w-full bg-gradient-to-r from-transparent via-primary/40 to-transparent mt-4"></div>
</div>
<!-- Input Section -->
<div class="w-full space-y-12">
<div class="relative group">
<div class="absolute -left-4 top-1/2 -translate-y-1/2 w-1 h-8 bg-primary"></div>
<label class="font-label text-[10px] text-primary/60 uppercase block mb-2 px-1" for="player-name">Subject_Designation</label>
<input class="w-full bg-transparent border-none border-b-2 border-primary-container focus:border-primary focus:ring-0 text-3xl font-headline uppercase tracking-widest py-4 transition-all placeholder:text-white/10" id="player-name" placeholder="ENTER NAME..." type="text"/>
<div class="absolute right-0 bottom-2">
<span class="font-label text-[10px] text-primary/40 animate-pulse">AWAITING_INPUT_</span>
</div>
</div>
<p class="font-body text-on-surface-variant text-center text-sm tracking-wide opacity-70">
                Enter your name to begin the level-up grind.
            </p>
<!-- Keypad Style Interface Element -->
<div class="grid grid-cols-3 gap-2 p-4 bg-surface-container-low/40 border border-blue-500/20 backdrop-blur-md">
<div class="aspect-square border border-blue-500/10 flex items-center justify-center font-label text-primary/40 text-xs">A1</div>
<div class="aspect-square border border-blue-500/10 flex items-center justify-center font-label text-primary/40 text-xs">A2</div>
<div class="aspect-square border border-blue-500/10 flex items-center justify-center font-label text-primary/40 text-xs">A3</div>
<div class="aspect-square border border-blue-500/10 flex items-center justify-center font-label text-primary/40 text-xs">B1</div>
<div class="col-span-1 aspect-square flex items-center justify-center">
<div class="w-2 h-2 bg-primary rotate-45 animate-ping"></div>
</div>
<div class="aspect-square border border-blue-500/10 flex items-center justify-center font-label text-primary/40 text-xs">B3</div>
</div>
<!-- Action Button -->
<button class="w-full group relative overflow-hidden transition-all active:scale-[0.98]">
<!-- Glowing Layer -->
<div class="absolute inset-0 bg-primary/20 blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
<!-- Main Button Body -->
<div class="clipped-corner bg-primary py-5 relative z-10 flex items-center justify-center gap-3">
<span class="font-headline font-black text-on-primary tracking-[0.2em] text-xl">INITIALIZE SYSTEM</span>
<span class="material-symbols-outlined text-on-primary" data-icon="terminal">terminal</span>
</div>
<!-- Decorative Border -->
<div class="absolute -inset-[1px] clipped-corner bg-white/20 -z-10 group-hover:bg-white/40 transition-colors"></div>
</button>
</div>
</main>
<!-- Footer Meta-Data -->
<footer class="fixed bottom-8 w-full px-12 flex justify-between items-end pointer-events-none">
<div class="space-y-1">
<div class="w-32 h-1 bg-surface-container-highest">
<div class="w-2/3 h-full bg-primary shadow-[0_0_8px_#a9c7ff]"></div>
</div>
<p class="font-label text-[9px] text-primary/40">CORE_LOAD: 67%</p>
</div>
<div class="text-right">
<p class="font-label text-[9px] text-primary/40 uppercase">System Sovereign v4.2.0</p>
<p class="font-label text-[9px] text-primary/20">ESTABLISHING_STABLE_CONNECTION...</p>
</div>
</footer>
<!-- Decorative Corner UI Elements -->
<div class="fixed top-20 left-6 pointer-events-none opacity-20">
<div class="w-12 h-12 border-l border-t border-primary"></div>
</div>
<div class="fixed bottom-24 right-6 pointer-events-none opacity-20">
<div class="w-12 h-12 border-r border-b border-primary"></div>
</div>
</body></html>
