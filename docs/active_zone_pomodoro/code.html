<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>System Window - Active Zone</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#338dfa",
                        "background-light": "#f5f7f8",
                        "background-dark": "#050507", // Void Black
                        "surface": "#111318", // Obsidian
                        "text-main": "#E2E8F0", // Frost White
                        "text-muted": "#475569", // Slate
                        "accent-danger": "#FF2E2E", // Penalty Red
                        "accent-secondary": "#B829DF", // Shadow Purple
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                    boxShadow: {
                        'neon-blue': '0 0 10px rgba(51, 141, 250, 0.5), 0 0 20px rgba(51, 141, 250, 0.3), 0 0 40px rgba(51, 141, 250, 0.1)',
                        'neon-red': '0 0 10px rgba(255, 46, 46, 0.5), 0 0 20px rgba(255, 46, 46, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom glow styles to ensure neon effect */
        .text-glow-primary {
            text-shadow: 0 0 15px rgba(51, 141, 250, 0.7), 0 0 30px rgba(51, 141, 250, 0.4);
        }
        .text-glow-danger {
            text-shadow: 0 0 10px rgba(255, 46, 46, 0.6);
        }
        .svg-glow-primary {
            filter: drop-shadow(0 0 12px rgba(51, 141, 250, 0.8)) drop-shadow(0 0 24px rgba(51, 141, 250, 0.4));
        }
        
        /* Hide scrollbars for full screen effect */
        body {
            overflow: hidden;
            overscroll-behavior-y: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-text-main font-display min-h-screen w-full flex flex-col items-center justify-between select-none">
<!-- Top Section: Quest Metadata -->
<header class="w-full pt-12 pb-6 px-6 text-center flex flex-col items-center gap-2 opacity-80 z-10">
<div class="flex items-center justify-center gap-2 text-primary mb-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">terminal</span>
<p class="text-xs font-bold tracking-[0.2em] uppercase text-primary text-glow-primary">System Engagement</p>
</div>
<h1 class="text-text-muted text-sm font-medium tracking-[0.1em] uppercase border-b border-surface pb-2 w-full max-w-[200px]">
            Aptitude Quest: Deep Work
        </h1>
</header>
<!-- Center Section: Monolithic Timer & Ring -->
<main class="flex-1 flex items-center justify-center relative w-full px-4 z-0">
<!-- Decorative outer rings -->
<div class="absolute w-[340px] h-[340px] rounded-full border border-surface opacity-50"></div>
<div class="absolute w-[360px] h-[360px] rounded-full border border-surface border-dashed opacity-20"></div>
<div class="absolute w-[300px] h-[300px] rounded-full border-2 border-primary opacity-10"></div>
<!-- Main Depletion Ring (SVG) -->
<div class="relative flex items-center justify-center w-[280px] h-[280px]">
<svg class="absolute inset-0 w-full h-full transform -rotate-90 svg-glow-primary" viewbox="0 0 100 100">
<!-- Background track -->
<circle cx="50" cy="50" fill="none" r="48" stroke="#111318" stroke-width="2"></circle>
<!-- Depleting progress (approx 80% remaining for visual) -->
<circle cx="50" cy="50" fill="none" r="48" stroke="#338dfa" stroke-dasharray="301.59" stroke-dashoffset="60" stroke-linecap="round" stroke-width="3"></circle>
<!-- Inner decorative dashes -->
<circle cx="50" cy="50" fill="none" opacity="0.5" r="40" stroke="#338dfa" stroke-dasharray="2 4" stroke-width="0.5"></circle>
</svg>
<!-- Holographic Countdown Timer -->
<div class="flex flex-col items-center justify-center z-10 mt-2">
<span class="text-[80px] leading-none font-bold text-primary text-glow-primary tracking-tighter">
                    24<span class="opacity-80 animate-pulse">:</span>59
                </span>
<div class="flex items-center gap-1 mt-4 opacity-60">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-ping"></span>
<span class="text-xs font-mono text-primary uppercase tracking-[0.15em]">Sync Active</span>
</div>
</div>
<!-- Crosshairs decorative elements -->
<div class="absolute top-[-10px] left-1/2 w-0.5 h-[20px] bg-primary opacity-40 transform -translate-x-1/2"></div>
<div class="absolute bottom-[-10px] left-1/2 w-0.5 h-[20px] bg-primary opacity-40 transform -translate-x-1/2"></div>
<div class="absolute left-[-10px] top-1/2 h-0.5 w-[20px] bg-primary opacity-40 transform -translate-y-1/2"></div>
<div class="absolute right-[-10px] top-1/2 h-0.5 w-[20px] bg-primary opacity-40 transform -translate-y-1/2"></div>
</div>
</main>
<!-- Bottom Section: Abort Button -->
<footer class="w-full pb-16 pt-8 px-8 flex flex-col items-center justify-center z-10 relative">
<!-- Interaction hint -->
<p class="text-[10px] text-text-muted mb-4 uppercase tracking-[0.2em] opacity-60">Hold 3s to override</p>
<!-- Hold-to-Abort Button container -->
<button class="relative group flex flex-col items-center justify-center w-full max-w-[280px] h-[56px] bg-transparent border border-accent-danger/20 rounded shadow-[inset_0_0_15px_rgba(255,46,46,0.05)] overflow-hidden transition-colors active:border-accent-danger/50">
<!-- Simulated progress bar for holding (empty state in visual) -->
<div class="absolute bottom-0 left-0 h-1 bg-accent-danger w-0 opacity-80"></div>
<div class="flex items-center gap-3 z-10">
<span class="material-symbols-outlined text-accent-danger text-lg text-glow-danger" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="text-accent-danger font-bold text-sm tracking-[0.15em] uppercase text-glow-danger">Abort Quest</span>
</div>
</button>
<!-- Consequence Subtext -->
<p class="mt-3 text-[11px] text-accent-danger/70 uppercase tracking-widest font-mono">
            (Incurs Penalty)
        </p>
</footer>
</body></html>
